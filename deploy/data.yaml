# Tangra Asterisk Data Configuration
# Place this file at /etc/tangra-asterisk/data.yaml.
#
# DSNs are sensitive — prefer overriding via env vars in
# /etc/tangra-asterisk/env (ASTERISK_CDR_DSN, ASTERISK_CONFIG_DSN) and
# leaving the placeholders below.

data:
  asterisk:
    cdr_dsn: ""
    config_dsn: ""
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: 30m
    query_timeout: 30s
