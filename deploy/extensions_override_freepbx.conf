;==============================================================
; FreePBX dialplan overrides for RTP QoS capture into CDR
;
; Drop this file at /etc/asterisk/extensions_override_freepbx.conf,
; then `asterisk -rx 'dialplan reload'`.
;
; Captures one bidirectional RTP-quality blob per call into cdr.rtpqos.
; That blob (RTPAUDIOQOS or RTPAUDIOQOSBRIDGED, whichever has data)
; carries both audio directions via its rx*/tx* fields:
;
;   rxjitter / rxmes / lp     — quality of audio THIS endpoint received
;   txjitter / txmes / rlp    — quality the OTHER endpoint received
;                                (reported back via RTCP receiver reports)
;
; Why the IF() fallback: which variable holds the data depends on the
; call's path through FreePBX:
;   - Outbound (ext → trunk): originator runs the macro, RTPAUDIOQOS
;     holds its own bidirectional stats.
;   - Inbound through Playback()/announcement: by the time the trunk's
;     macro runs, RTPAUDIOQOS has been cleared by the Playback. The
;     bridged peer's full blob is in RTPAUDIOQOSBRIDGED instead.
; Either way, the picked blob has rx + tx and represents the call.
;
; cdr.peerrtpqos is intentionally NOT written — Asterisk gives us only
; one perspective per call (no easy way to capture the *other*
; endpoint's independent view from a single dialplan), and the chosen
; blob already covers both audio directions.
;==============================================================

[macro-hangupcall]
include => macro-hangupcall-custom
exten => s,1,Set(__MCVMSTATUS=${VMSTATUS})

exten => s,n,Set(QOS=${IF($[${LEN(${RTPAUDIOQOS})} > 0]?${RTPAUDIOQOS}:${RTPAUDIOQOSBRIDGED})})
exten => s,n,NoOp(QOS_DBG ch=${CHANNEL} qos='${QOS}')
exten => s,n,Set(CDR(rtpqos)=${QOS})

exten => s,n,Gosub(app-missedcall-hangup,${EXTEN},1())
exten => s,n,UserEvent(MES,RTPAUDIOQOSMESBRIDGED:${RTPAUDIOQOSMESBRIDGED},RTPAUDIOQOSMES:${RTPAUDIOQOSMES})
exten => s,n(start),GotoIf($["${USE_CONFIRMATION}"="" | "${RINGGROUP_INDEX}"="" | "${CHANNEL}"!="${UNIQCHAN}"]?theend)
exten => s,n(delrgi),Noop(Deleting: RG/${RINGGROUP_INDEX}/${CHANNEL} ${DB_DELETE(RG/${RINGGROUP_INDEX}/${CHANNEL})})
exten => s,n(theend),ExecIf($["${ONETOUCH_RECFILE}"!="" & "${CDR(recordingfile)}"=""]?Set(CDR(recordingfile)=${ONETOUCH_RECFILE}))
exten => s,n(hangup),Hangup()
exten => s,n,Return(${GOSUB_RETVAL})

[crm-hangup]
include => crm-hangup-custom
exten => s,1,Noop(Sending Hangup to CRM)

; Only the master channel writes QoS — avoids per-leg duplicates that
; would all overwrite each other anyway.
exten => s,n,GotoIf($["${CHANNEL(UNIQUEID)}"!="${MASTER_CHANNEL(CHANNEL(UNIQUEID))}"]?skipqos)

exten => s,n,Set(QOS=${IF($[${LEN(${RTPAUDIOQOS})} > 0]?${RTPAUDIOQOS}:${RTPAUDIOQOSBRIDGED})})
exten => s,n,NoOp(QOS_DBG_CRM ch=${CHANNEL} qos='${QOS}')
exten => s,n,Set(CDR(rtpqos)=${QOS})

exten => s,n(skipqos),Noop(QoS capture done or skipped)
exten => s,n,Noop(HANGUP CAUSE: ${HANGUPCAUSE})
exten => s,n,ExecIf($[${LEN(${CRM_VOICEMAIL})} > 0]?Set(__CRM_VOICEMAIL=${VMSTATUS}))
exten => s,n,Noop(MASTER CHANNEL: ${CHANNEL(UNIQUEID)} = ${MASTER_CHANNEL(CHANNEL(UNIQUEID))})
exten => s,n,GotoIf($["${CHANNEL(UNIQUEID)}"!="${MASTER_CHANNEL(CHANNEL(UNIQUEID))}"]?return)
exten => s,n,Set(__CRM_HANGUP=1)
exten => s,n,AGI(agi://127.0.0.1/sangomacrm.agi)
exten => s,n(return),Return()
