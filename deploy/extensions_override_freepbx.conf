;==============================================================
; FreePBX dialplan overrides for RTP QoS capture into CDR
;
; Drop this file at /etc/asterisk/extensions_override_freepbx.conf,
; then `asterisk -rx 'dialplan reload'`.
;
; Captures TRUE two-perspective RTP-quality stats:
;   cdr.rtpqos     = the master/originator channel's view
;   cdr.peerrtpqos = the bridged peer channel's view
;
; How each value is reached:
;
; macro-hangupcall runs ON THE MASTER channel via the `h` extension
; chain (e.g. dial-with-exten,h,1 → Gosub(macro-hangupcall,s,1)). It
; only ever sees one channel at hangup time, so it writes that
; channel's stats into rtpqos. Falls back from RTPAUDIOQOS to
; RTPAUDIOQOSBRIDGED because some flows (inbound through Playback())
; clear the auto-set RTPAUDIOQOS before the macro fires, while
; RTPAUDIOQOSBRIDGED still carries a complete blob.
;
; crm-hangup is pushed as a CHANNEL(hangup_handler_push) on EVERY
; PJSIP channel via b(func-apply-sipheaders^s^1) in FreePBX's Dial
; lines. So it runs on:
;   - the master channel (after macro-hangupcall)
;   - the bridged peer channel (the one created by Dial)
; That gives us a free per-channel hook. We compare UNIQUEID against
; the master and route the write:
;   - master:  writes CDR(rtpqos)     (idempotent re-write — same blob
;              macro-hangupcall already produced)
;   - peer:    writes MASTER_CHANNEL(CDR(peerrtpqos)) so the master
;              CDR row gets the bridged peer's perspective
;
; One-time schema setup:
;   ALTER TABLE asteriskcdrdb.cdr
;     ADD COLUMN peerrtpqos VARCHAR(512) DEFAULT NULL;
;==============================================================

[macro-hangupcall]
include => macro-hangupcall-custom
exten => s,1,Set(__MCVMSTATUS=${VMSTATUS})

exten => s,n,Set(QOS=${IF($[${LEN(${RTPAUDIOQOS})} > 0]?${RTPAUDIOQOS}:${RTPAUDIOQOSBRIDGED})})
exten => s,n,NoOp(QOS_DBG_M ch=${CHANNEL} uid=${UNIQUEID} master=${MASTER_CHANNEL(CHANNEL(UNIQUEID))} qos='${QOS}')
exten => s,n,Set(CDR(rtpqos)=${QOS})

exten => s,n,Gosub(app-missedcall-hangup,${EXTEN},1())
exten => s,n,UserEvent(MES,RTPAUDIOQOSMESBRIDGED:${RTPAUDIOQOSMESBRIDGED},RTPAUDIOQOSMES:${RTPAUDIOQOSMES})
exten => s,n(start),GotoIf($["${USE_CONFIRMATION}"="" | "${RINGGROUP_INDEX}"="" | "${CHANNEL}"!="${UNIQCHAN}"]?theend)
exten => s,n(delrgi),Noop(Deleting: RG/${RINGGROUP_INDEX}/${CHANNEL} ${DB_DELETE(RG/${RINGGROUP_INDEX}/${CHANNEL})})
exten => s,n(theend),ExecIf($["${ONETOUCH_RECFILE}"!="" & "${CDR(recordingfile)}"=""]?Set(CDR(recordingfile)=${ONETOUCH_RECFILE}))
exten => s,n(hangup),Hangup()
exten => s,n,Return(${GOSUB_RETVAL})

[crm-hangup]
include => crm-hangup-custom
exten => s,1,Noop(Sending Hangup to CRM)

; Per-channel QoS capture. crm-hangup is pushed as a hangup handler
; on every PJSIP channel via FreePBX's b(func-apply-sipheaders) Dial
; option, so this runs on BOTH the master and the bridged peer. Each
; channel writes its own RTPAUDIOQOS:
;   - master  → CDR(rtpqos)         (re-asserts what macro-hangupcall already wrote)
;   - peer    → MASTER_CHANNEL(CDR(peerrtpqos))
; Empty QoS is silently skipped (handler still proceeds with the
; existing CRM AGI for the master path).
exten => s,n,Set(QOS=${IF($[${LEN(${RTPAUDIOQOS})} > 0]?${RTPAUDIOQOS}:${RTPAUDIOQOSBRIDGED})})
exten => s,n,NoOp(QOS_DBG_C ch=${CHANNEL} uid=${UNIQUEID} master=${MASTER_CHANNEL(CHANNEL(UNIQUEID))} qos='${QOS}')
exten => s,n,GotoIf($["${LEN(${QOS})}"="0"]?aftercrmqos)
exten => s,n,GotoIf($["${CHANNEL(UNIQUEID)}"="${MASTER_CHANNEL(CHANNEL(UNIQUEID))}"]?writelocal:writepeer)
exten => s,n(writelocal),Set(CDR(rtpqos)=${QOS})
exten => s,n,Goto(aftercrmqos)
exten => s,n(writepeer),Set(MASTER_CHANNEL(CDR(peerrtpqos))=${QOS})

exten => s,n(aftercrmqos),Noop(QoS capture done)
exten => s,n,Noop(HANGUP CAUSE: ${HANGUPCAUSE})
exten => s,n,ExecIf($[${LEN(${CRM_VOICEMAIL})} > 0]?Set(__CRM_VOICEMAIL=${VMSTATUS}))
exten => s,n,Noop(MASTER CHANNEL: ${CHANNEL(UNIQUEID)} = ${MASTER_CHANNEL(CHANNEL(UNIQUEID))})
exten => s,n,GotoIf($["${CHANNEL(UNIQUEID)}"!="${MASTER_CHANNEL(CHANNEL(UNIQUEID))}"]?return)
exten => s,n,Set(__CRM_HANGUP=1)
exten => s,n,AGI(agi://127.0.0.1/sangomacrm.agi)
exten => s,n(return),Return()
