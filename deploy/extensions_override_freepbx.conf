;==============================================================
; FreePBX dialplan overrides for RTP QoS capture into CDR
;
; Drop this file at /etc/asterisk/extensions_override_freepbx.conf,
; then `asterisk -rx 'dialplan reload'`.
;
; Captures BOTH perspectives of every answered 2-party call into
; the cdr table:
;   rtpqos     = local channel  (whoever ran the macro)
;   peerrtpqos = bridged peer   (read by name via BRIDGEPEER)
;
; tangra-asterisk parses both columns and surfaces local-vs-peer
; comparison in the call drawer + Prometheus metrics.
;
; Why CHANNEL(rtpqos,${BRIDGEPEER}) instead of just $RTPAUDIOQOSBRIDGED:
;   for inbound calls that go through Playback() / announcement
;   before Dial(), the trunk channel's auto-set RTPAUDIOQOS /
;   RTPAUDIOQOSBRIDGED variables are empty by the time hangup runs —
;   the actual RTP stats live on the Dial-created peer channel.
;   Reading by ${BRIDGEPEER} pulls them directly. Falls back to the
;   auto-set vars on calls where BRIDGEPEER is empty (failed Dial,
;   no bridge formed).
;
; One-time schema setup:
;   ALTER TABLE asteriskcdrdb.cdr
;     ADD COLUMN peerrtpqos VARCHAR(512) DEFAULT NULL;
;==============================================================

[macro-hangupcall]
include => macro-hangupcall-custom
exten => s,1,Set(__MCVMSTATUS=${VMSTATUS})

; Local view: prefer the auto-set RTPAUDIOQOS, fall back to the
; explicit CHANNEL() function (some Asterisk versions populate the
; function more reliably than the legacy variable).
exten => s,n,Set(LOCAL_QOS=${IF($[${LEN(${RTPAUDIOQOS})} > 0]?${RTPAUDIOQOS}:${CHANNEL(rtpqos)})})

; Peer view: read the BRIDGEPEER channel's stats by name. Falls back
; to RTPAUDIOQOSBRIDGED when there's no current bridge peer (e.g. the
; bridge already tore down before the macro ran).
exten => s,n,Set(PEER_QOS=${IF($[${LEN(${BRIDGEPEER})} > 0]?${CHANNEL(rtpqos,${BRIDGEPEER})}:${RTPAUDIOQOSBRIDGED})})

exten => s,n,NoOp(QOS_DBG ch=${CHANNEL} peer=${BRIDGEPEER} local='${LOCAL_QOS}' peer_view='${PEER_QOS}')

exten => s,n,Set(CDR(rtpqos)=${LOCAL_QOS})
exten => s,n,Set(CDR(peerrtpqos)=${PEER_QOS})

exten => s,n,Gosub(app-missedcall-hangup,${EXTEN},1())
exten => s,n,UserEvent(MES,RTPAUDIOQOSMESBRIDGED:${RTPAUDIOQOSMESBRIDGED},RTPAUDIOQOSMES:${RTPAUDIOQOSMES})
exten => s,n(start),GotoIf($["${USE_CONFIRMATION}"="" | "${RINGGROUP_INDEX}"="" | "${CHANNEL}"!="${UNIQCHAN}"]?theend)
exten => s,n(delrgi),Noop(Deleting: RG/${RINGGROUP_INDEX}/${CHANNEL} ${DB_DELETE(RG/${RINGGROUP_INDEX}/${CHANNEL})})
exten => s,n(theend),ExecIf($["${ONETOUCH_RECFILE}"!="" & "${CDR(recordingfile)}"=""]?Set(CDR(recordingfile)=${ONETOUCH_RECFILE}))
exten => s,n(hangup),Hangup()
exten => s,n,Return(${GOSUB_RETVAL})

[crm-hangup]
include => crm-hangup-custom
exten => s,1,Noop(Sending Hangup to CRM)

; Only the master channel writes QoS — avoids per-leg duplicates that
; would all overwrite each other anyway.
exten => s,n,GotoIf($["${CHANNEL(UNIQUEID)}"!="${MASTER_CHANNEL(CHANNEL(UNIQUEID))}"]?skipqos)

exten => s,n,Set(LOCAL_QOS=${IF($[${LEN(${RTPAUDIOQOS})} > 0]?${RTPAUDIOQOS}:${CHANNEL(rtpqos)})})
exten => s,n,Set(PEER_QOS=${IF($[${LEN(${BRIDGEPEER})} > 0]?${CHANNEL(rtpqos,${BRIDGEPEER})}:${RTPAUDIOQOSBRIDGED})})

exten => s,n,NoOp(QOS_DBG_CRM ch=${CHANNEL} peer=${BRIDGEPEER} local='${LOCAL_QOS}' peer_view='${PEER_QOS}')

exten => s,n,Set(CDR(rtpqos)=${LOCAL_QOS})
exten => s,n,Set(CDR(peerrtpqos)=${PEER_QOS})

exten => s,n(skipqos),Noop(QoS capture done or skipped)
exten => s,n,Noop(HANGUP CAUSE: ${HANGUPCAUSE})
exten => s,n,ExecIf($[${LEN(${CRM_VOICEMAIL})} > 0]?Set(__CRM_VOICEMAIL=${VMSTATUS}))
exten => s,n,Noop(MASTER CHANNEL: ${CHANNEL(UNIQUEID)} = ${MASTER_CHANNEL(CHANNEL(UNIQUEID))})
exten => s,n,GotoIf($["${CHANNEL(UNIQUEID)}"!="${MASTER_CHANNEL(CHANNEL(UNIQUEID))}"]?return)
exten => s,n,Set(__CRM_HANGUP=1)
exten => s,n,AGI(agi://127.0.0.1/sangomacrm.agi)
exten => s,n(return),Return()
